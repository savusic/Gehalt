<!DOCTYPE html>
<html>
<head>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💲</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 20px;
  background: #f4f6f9;
}

.card {
  max-width: 400px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0px 8px 25px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  border: none;
  border-radius: 12px;
  background: #007bff;
  color: white;
}

.result {
  margin-top: 20px;
  font-size: 18px;
  text-align: center;
}

.box {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
}

.Mann { background: #d4edda; }
.Frau { background: #f8d7da; }

.topbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 15px;
}

/* ✅ Runde Flag-Buttons */
.flags {
  display: flex;
  gap: 10px;
}

.flags span {
  width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 50%;
  cursor: pointer;
  background: #f1f1f1;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
  transition: all 0.2s;
}

/* Hover Effekt */
.flags span:hover {
  transform: scale(1.15);
}

/* Aktive Flagge */
.flags span.active {
  background: #007bff;
  color: white;
}
</style>
</head>

<body>

<div class="card">

  <div class="topbar">
    <div class="flags">
      <span onclick="setLang('de')">🇩🇪</span>
      <span onclick="setLang('en')">🇬🇧</span>
      <span onclick="setLang('es')">🇪🇸</span>
    </div>
  </div>

  <h2 id="title">Gemeinsames Konto</h2>

  <input id="a" placeholder="Mann Lohn">
  <input id="b" placeholder="Frau Lohn">
  <input id="d" placeholder="Gesamtsumme">

  <button onclick="calc()" id="calcBtn">Berechnen</button>

  <div class="result" id="result"></div>
</div>

<script>
let lang = "de";

const translations = {
  de: {
    title: "Gemeinsames Konto",
    man: "Mann Lohn",
    woman: "Frau Lohn",
    total: "Gesamtsumme",
    calc: "Berechnen",
    error: "⚠️ Bitte gültige Werte eingeben",
    manPays: "👤 Mann überweist:",
    womanPays: "👩 Frau überweist:"
  },
  en: {
    title: "Shared Account",
    man: "Man Salary",
    woman: "Woman Salary",
    total: "Total Amount",
    calc: "Calculate",
    error: "⚠️ Please enter valid values",
    manPays: "👤 Man pays:",
    womanPays: "👩 Woman pays:"
  },
  es: {
    title: "Cuenta Compartida",
    man: "Salario Hombre",
    woman: "Salario Mujer",
    total: "Cantidad Total",
    calc: "Calcular",
    error: "⚠️ Introduce valores válidos",
    manPays: "👤 Hombre paga:",
    womanPays: "👩 Mujer paga:"
  }
};

function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  applyLang();
}

function applyLang() {
  const t = translations[lang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("a").placeholder = t.man;
  document.getElementById("b").placeholder = t.woman;
  document.getElementById("d").placeholder = t.total;
  document.getElementById("calcBtn").innerText = t.calc;

  // ✅ aktive Flag setzen
  document.querySelectorAll(".flags span").forEach(el => {
    el.classList.remove("active");
  });

  const index = lang === "de" ? 0 : lang === "en" ? 1 : 2;
  document.querySelectorAll(".flags span")[index].classList.add("active");
}

function formatEUR(value) {
  return new Intl.NumberFormat(
    lang === "de" ? "de-DE" : lang === "es" ? "es-ES" : "en-US",
    { style: 'currency', currency: 'EUR' }
  ).format(value);
}

function calc() {
  let a = parseFloat(document.getElementById('a').value);
  let b = parseFloat(document.getElementById('b').value);
  let d = parseFloat(document.getElementById('d').value);

  const t = translations[lang];

  if (isNaN(a) || isNaN(b) || isNaN(d) || (a + b) === 0) {
    document.getElementById('result').innerHTML = t.error;
    return;
  }

  let Mann = d / (a + b) * a;
  let Frau = d / (a + b) * b;

  document.getElementById('result').innerHTML = `
    <div class="box Mann">${t.manPays}<br><b>${formatEUR(Mann)}</b></div>
    <div class="box Frau">${t.womanPays}<br><b>${formatEUR(Frau)}</b></div>
  `;
}

window.onload = function() {
  document.getElementById('a').value = localStorage.getItem("a") || "";
  document.getElementById('b').value = localStorage.getItem("b") || "";
  document.getElementById('d').value = localStorage.getItem("d") || "";

  lang = localStorage.getItem("lang") || "de";
  applyLang();
}
</script>

</body>
</html>
