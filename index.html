<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: #f4f6f9;
    transition: 0.3s;
  }

  .dark {
    background: #1e1e1e;
    color: #fff;
  }

  .card {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
  }

  .dark .card {
    background: #2c2c2c;
  }

  h2 {
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
  }

  .result {
    margin-top: 20px;
    font-size: 18px;
    text-align: center;
  }

  .box {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
  }

  .iulian {
    background: #d4edda;
  }

  .vanessa {
    background: #f8d7da;
  }

  .dark .iulian {
    background: #2e5e3e;
  }

  .dark .vanessa {
    background: #6b2c2c;
  }

  .toggle {
    margin-bottom: 15px;
    text-align: right;
  }
</style>
</head>

<body>

<div class="card">
  <div class="toggle">
    <button onclick="toggleMode()">🌙 Dark Mode</button>
  </div>

  <h2>Gemeinsames Konto</h2>

  <input id="a" placeholder="Iulian Lohn">
  <input id="b" placeholder="Vanessa Lohn">
  <input id="d" placeholder="Gesamtsumme">

  <button onclick="calc()">Berechnen</button>

  <div class="result" id="result"></div>
</div>

<script>
function formatEUR(value) {
  return new Intl.NumberFormat('de-DE', {
    style: 'currency',
    currency: 'EUR'
  }).format(value);
}

function calc() {
  let a = parseFloat(document.getElementById('a').value);
  let b = parseFloat(document.getElementById('b').value);
  let d = parseFloat(document.getElementById('d').value);

  if (isNaN(a) || isNaN(b) || isNaN(d) || (a + b) === 0) {
    document.getElementById('result').innerHTML = "⚠️ Bitte gültige Werte eingeben";
    return;
  }

  let iulian = d / (a + b) * a;
  let vanessa = d / (a + b) * b;

  document.getElementById('result').innerHTML = `
    <div class="box iulian">👤 Iulian überweist:<br><b>${formatEUR(iulian)}</b></div>
    <div class="box vanessa">👩 Vanessa überweist:<br><b>${formatEUR(vanessa)}</b></div>
  `;

  localStorage.setItem("a", a);
  localStorage.setItem("b", b);
  localStorage.setItem("d", d);
}

window.onload = function() {
  document.getElementById('a').value = localStorage.getItem("a") || "";
  document.getElementById('b').value = localStorage.getItem("b") || "";
  document.getElementById('d').value = localStorage.getItem("d") || "";
}

function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
