<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial;
    margin: 0;
    padding: 20px;
    background: #f4f6f9;
    transition: 0.3s;
  }

  .dark {
    background: #1e1e1e;
    color: #fff;
  }

  .card {
    max-width: 400px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
  }

  .dark .card {
    background: #2c2c2c;
  }

  h2 {
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #007bff;
    color: white;
  }

  .result {
    margin-top: 20px;
    font-size: 18px;
    text-align: center;
  }

  .box {
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
  }

  .Mann { background: #d4edda; }
  .Frau { background: #f8d7da; }

  .dark .Mann { background: #2e5e3e; }
  .dark .Frau { background: #6b2c2c; }

  .topbar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
  }

  select {
    padding: 6px;
    border-radius: 8px;
  }
</style>
</head>

<body>

<div class="card">

  <div class="topbar">
    <button onclick="toggleMode()">🌙</button>

    <!-- ✅ Sprach-Auswahl -->
    <select onchange="setLang(this.value)" id="langSelect">
      <option value="de">Deutsch</option>
      <option value="en">English</option>
      <option value="es">Español</option>
    </select>
  </div>

  <h2 id="title">Gemeinsames Konto</h2>

  <input id="a" placeholder="Mann Lohn">
  <input id="b" placeholder="Frau Lohn">
  <input id="d" placeholder="Gesamtsumme">

  <button onclick="calc()" id="calcBtn">Berechnen</button>

  <div class="result" id="result"></div>
</div>

<script>
let lang = "de";

// ✅ Übersetzungen
const translations = {
  de: {
    title: "Gemeinsames Konto",
    man: "Mann Lohn",
    woman: "Frau Lohn",
    total: "Gesamtsumme",
    calc: "Berechnen",
    error: "⚠️ Bitte gültige Werte eingeben",
    manPays: "👤 Mann überweist:",
    womanPays: "👩 Frau überweist:"
  },
  en: {
    title: "Shared Account",
    man: "Man Salary",
    woman: "Woman Salary",
    total: "Total Amount",
    calc: "Calculate",
    error: "⚠️ Please enter valid values",
    manPays: "👤 Man pays:",
    womanPays: "👩 Woman pays:"
  },
  es: {
    title: "Cuenta Compartida",
    man: "Salario Hombre",
    woman: "Salario Mujer",
    total: "Cantidad Total",
    calc: "Calcular",
    error: "⚠️ Introduce valores válidos",
    manPays: "👤 Hombre paga:",
    womanPays: "👩 Mujer paga:"
  }
};

// ✅ Sprache setzen
function setLang(l) {
  lang = l;
  localStorage.setItem("lang", l);
  applyLang();
}

// ✅ Texte anwenden
function applyLang() {
  const t = translations[lang];

  document.getElementById("title").innerText = t.title;
  document.getElementById("a").placeholder = t.man;
  document.getElementById("b").placeholder = t.woman;
  document.getElementById("d").placeholder = t.total;
  document.getElementById("calcBtn").innerText = t.calc;
}

// ✅ Währung formatieren (je nach Sprache)
function formatEUR(value) {
  return new Intl.NumberFormat(lang === "de" ? "de-DE" : lang === "es" ? "es-ES" : "en-US", {
    style: 'currency',
    currency: 'EUR'
  }).format(value);
}

function calc() {
  let a = parseFloat(document.getElementById('a').value);
  let b = parseFloat(document.getElementById('b').value);
  let d = parseFloat(document.getElementById('d').value);

  const t = translations[lang];

  if (isNaN(a) || isNaN(b) || isNaN(d) || (a + b) === 0) {
    document.getElementById('result').innerHTML = t.error;
    return;
  }

  let Mann = d / (a + b) * a;
  let Frau = d / (a + b) * b;

  document.getElementById('result').innerHTML = `
    <div class="box Mann">${t.manPays}<br><b>${formatEUR(Mann)}</b></div>
    <div class="box Frau">${t.womanPays}<br><b>${formatEUR(Frau)}</b></div>
  `;
}

// ✅ Beim Laden Sprache wiederherstellen
window.onload = function() {
  document.getElementById('a').value = localStorage.getItem("a") || "";
  document.getElementById('b').value = localStorage.getItem("b") || "";
  document.getElementById('d').value = localStorage.getItem("d") || "";

  lang = localStorage.getItem("lang") || "de";
  document.getElementById("langSelect").value = lang;

  applyLang();
}

function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
